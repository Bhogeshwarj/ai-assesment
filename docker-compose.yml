services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tea
      POSTGRES_PASSWORD: tea
      POSTGRES_DB: tea_packaging
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tea -d tea_packaging"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://tea:tea@db:5432/tea_packaging
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Next.js inlines NEXT_PUBLIC_* vars at build time, so this must be a
        # build arg, not a runtime environment variable. Since the browser
        # (not the frontend container) calls this URL, it has to be reachable
        # from the user's machine - localhost:8000 works for local `docker
        # compose up`; point it at a real API host for other deployments.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    environment:
      # Runtime var (not NEXT_PUBLIC_) used only by server-side rendering,
      # which runs inside this container and must reach the backend over the
      # Docker network rather than through the host-published port.
      API_INTERNAL_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
