services:
  - type: web
    name: tea-packaging-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      # Set manually in the Render dashboard after the blueprint is created -
      # deliberately left out of source control (sync: false). Use a
      # postgresql+psycopg:// URL (SQLAlchemy + psycopg3 driver), e.g. a Neon
      # connection string with "postgresql://" swapped to "postgresql+psycopg://".
      - key: DATABASE_URL
        sync: false
      # Update to the deployed frontend's actual origin(s) once known, e.g.
      # '["https://your-app.vercel.app"]'.
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: LOG_LEVEL
        value: INFO
